<!DOCTYPE html>
<html>

<head>
	<title>SimpleShun's HomePage</title>
	<link rel="stylesheet" href="style.css" />
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Underdog&display=swap');
	</style>
</head>

<body class="blackbg">
	<div class="mainDiv underdog-regular" style="color: white;">
		<header style="align-content: center;align-items: center;text-align: center;">
			<h2 style="color: white;">SimpleShun</h2>
		</header>
		<div class="box">
			<div class="boxitem" style="text-align: center;">
				<h1 class="time"></h1>
			</div>
			<div class="imageDiv boxitem">
				<img src="op.webp" style="height: 75vh; object-fit:cover;object-position: 75% 0; width:90vh;" />
			</div>
			<div class="boxitem" style="text-align: center;">
				<h1 class="day"></h1>
			</div>
		</div>
		<div style="text-align: center;">
			Website
		</div>
	</div>
</body>

<script>
	let timefunc = function () {
		document.querySelector(".time").innerHTML = new Date().toLocaleTimeString()
	}
	timefunc()
	document.querySelector(".day").innerHTML = new Date().toDateString()
	setInterval(timefunc, 1000)
</script>
</html>
